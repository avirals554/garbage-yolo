<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo — Garbage YOLO</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="logo"><span class="dot"></span> Garbage YOLO</a>
      <div class="links">
        <a href="/">Home</a>
        <a href="/demo" class="active">Demo</a>
        <a href="/about">About</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <section class="demo-section">
        <h1>Live demo</h1>
        <p class="subtitle">Click start, allow camera access, hold up something for the model to spot.</p>

        <div class="controls">
          <button id="startBtn" class="btn btn-primary">Start camera</button>
          <span id="statusBadge" class="status-badge"><span class="dot"></span><span id="statusText">idle</span></span>
        </div>

        <div class="video-wrapper">
          <video id="remoteVideo" autoplay playsinline muted></video>
        </div>

        <div class="log" id="log">awaiting input...</div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">Built with aiohttp, aiortc, and YOLOv8.</div>
  </footer>

  <script src="/static/js/demo.js"></script>
</body>
</html>
